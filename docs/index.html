<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>recipe.maker — Save & Share Recipes</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <h1>recipe.maker</h1>
      <div id="auth-status"></div>
    </div>
    <p class="tagline">A tiny app to create, save & share recipes.</p>
  </header>

  <!-- Auth Section -->
  <div id="auth-section" class="container auth-container">
    <div class="auth-box">
      <h2>Sign In or Create Account</h2>
      <form id="auth-form">
        <input id="auth-email" type="email" placeholder="Email" required />
        <input id="auth-password" type="password" placeholder="Password" required />
        <div class="auth-buttons">
          <button type="button" id="sign-in-btn" class="btn-primary">Sign In</button>
          <button type="button" id="sign-up-btn" class="btn-secondary">Sign Up</button>
        </div>
      </form>
      <div id="auth-error" class="error-message"></div>
    </div>
  </div>

  <!-- App Section (hidden until authenticated) -->
  <main class="container" id="app-section" style="display:none">
    <section class="new-recipe">
      <h2>Add Recipe</h2>
      <form id="recipe-form">
        <input id="title" placeholder="Recipe title" required />
        <textarea id="ingredients" placeholder="Ingredients (comma separated)" required></textarea>
        <textarea id="steps" placeholder="Steps (one per line)" required></textarea>
        <button type="submit">Add</button>
      </form>
    </section>

    <section class="recipes">
      <h2>Saved Recipes</h2>
      <div id="recipes-list" class="list"></div>
    </section>
  </main>

  <footer class="site-footer">Built from README — recipe.maker</footer>
  <script src="js/main.js"></script>
</body>
</html>
